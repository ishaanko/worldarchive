static List<String> repositoryFiles(Project project) {
    def output = project.providers.exec {
        commandLine 'git', 'ls-files', '--cached', '--others', '--exclude-standard', '-z'
    }.standardOutput.asText.get()

    return output
        .split('\\u0000')
        .findAll { !it.isBlank() }
        .sort()
}

static boolean isTextFile(String path) {
    def extensions = [
        '.gradle', '.json', '.java', '.md', '.properties', '.ps1', '.xml', '.yml', '.yaml'
    ]
    return extensions.any { path.endsWith(it) }
        || path == '.gitattributes'
        || path == '.gitignore'
        || path == 'LICENSE'
}

tasks.register('verifyFormatting') {
    group = 'verification'
    description = 'Checks repository text files for basic formatting errors.'

    doLast {
        def failures = []
        repositoryFiles(project).findAll { isTextFile(it) }.each { path ->
            def text = file(path).getText('UTF-8')
            if (!text.endsWith('\n')) {
                failures << "${path}: missing final newline"
            }
            text.readLines().eachWithIndex { line, index ->
                if (line.contains('\t')) {
                    failures << "${path}:${index + 1}: tab character"
                }
                if (line != line.stripTrailing()) {
                    failures << "${path}:${index + 1}: trailing whitespace"
                }
            }
        }

        if (!failures.isEmpty()) {
            throw new GradleException("Formatting checks failed:\n" + failures.join('\n'))
        }
    }
}

tasks.register('cleanRoomScan') {
    group = 'verification'
    description = 'Rejects prohibited implementation provenance and tracked temporary content.'

    doLast {
        def forbiddenTerms = [
            ['Fast', 'Back'].join(''),
            ['net', '.', 'pcal'].join(''),
            ['GNU', ' GENERAL PUBLIC LICENSE'].join(''),
            ['GNU', ' LESSER GENERAL PUBLIC LICENSE'].join('')
        ]
        def failures = []

        repositoryFiles(project).each { path ->
            if (path == '.temp' || path.startsWith('.temp/')) {
                failures << "${path}: temporary content must not be tracked"
                return
            }
            if (!(path.startsWith('src/') || path.startsWith('config/'))) {
                return
            }
            if (!isTextFile(path)) {
                return
            }

            file(path).readLines('UTF-8').eachWithIndex { line, index ->
                forbiddenTerms.each { term ->
                    if (line.toLowerCase(Locale.ROOT).contains(term.toLowerCase(Locale.ROOT))) {
                        failures << "${path}:${index + 1}: prohibited clean-room reference"
                    }
                }
            }
        }

        if (!failures.isEmpty()) {
            throw new GradleException("Clean-room scan failed:\n" + failures.join('\n'))
        }
    }
}

tasks.register('verifyLicense') {
    group = 'verification'
    description = 'Verifies that the project carries the complete Apache-2.0 license.'

    doLast {
        def licenseFile = file('LICENSE')
        if (!licenseFile.isFile()) {
            throw new GradleException('LICENSE is missing')
        }

        def license = licenseFile.getText('UTF-8')
        if (!license.contains('Apache License')
                || !license.contains('Version 2.0, January 2004')
                || !license.contains('END OF TERMS AND CONDITIONS')) {
            throw new GradleException('LICENSE is not a complete Apache-2.0 license')
        }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyFormatting')
    dependsOn tasks.named('cleanRoomScan')
    dependsOn tasks.named('verifyLicense')
}
