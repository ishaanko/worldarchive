plugins {
    id 'net.fabricmc.fabric-loom' version "${loom_version}"
    id 'java'
    id 'checkstyle'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = 'worldarchive'
}

repositories {
    exclusiveContent {
        forRepository {
            maven {
                name = 'Modrinth'
                url = 'https://api.modrinth.com/maven'
            }
        }
        filter {
            includeGroup 'maven.modrinth'
        }
    }
}

loom {
    splitEnvironmentSourceSets()

    mods {
        worldarchive {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}"
    implementation "maven.modrinth:modmenu:${modmenu_version}"

    testImplementation platform('org.junit:junit-bom:5.13.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation sourceSets.client.output
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

processResources {
    def resourceProperties = [
        version: project.version,
        fabric_api_version: project.fabric_api_version
    ]
    inputs.properties resourceProperties

    filesMatching('fabric.mod.json') {
        expand resourceProperties
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = 25
    options.encoding = 'UTF-8'
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
    systemProperty 'java.io.tmpdir', file(System.getProperty('java.io.tmpdir')).canonicalPath
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    withSourcesJar()
}

checkstyle {
    toolVersion = '11.0.1'
    configFile = file('config/checkstyle/checkstyle.xml')
}

tasks.named('jar') {
    inputs.property 'projectName', project.name

    from('LICENSE') {
        rename { "${it}_${project.name}" }
    }
}

apply from: 'gradle/quality.gradle'
